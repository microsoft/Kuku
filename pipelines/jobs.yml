# This file selects the correct job definition based on system and buildType.

parameters:
  debug: 'false'

jobs:

- ${{ if eq(parameters.name, 'Windows') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    pool:
      vmImage: 'windows-latest'
    steps:
    - template: windows.yml
      parameters:
        nuget_version: '6.14.0'
        ${{ if eq(parameters.debug, 'true') }}:
          configuration: 'Debug'
          path: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          configuration: 'Release'
          path: 'Release'

- ${{ if eq(parameters.name, 'Linux') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - template: linux.yml
      parameters:
        artifactName: linux-drop
        ${{ if eq(parameters.debug, 'true') }}:
          configuration: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          configuration: 'Release'

- ${{ if eq(parameters.name, 'macOS') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    pool:
      vmImage: 'macos-latest'
    steps:
    - template: macos.yml
      parameters:
        artifactName: macos-drop
        ${{ if eq(parameters.debug, 'true') }}:
          configuration: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          configuration: 'Release'

- ${{ if eq(parameters.name, 'NuGet') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    dependsOn: [Windows, Linux, macOS]
    pool:
      vmImage: 'windows-latest'
    steps:
    - template: nuget.yml
      parameters:
        nuget_version: '6.14.0'
