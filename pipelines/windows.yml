steps:
- task: NuGetToolInstaller@1
  displayName: 'Use NuGet'
  inputs:
    versionSpec: ${{ parameters.nuget_version }}

- task: UseDotNet@2
  displayName: 'Get .NET 10 SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'

# The Microsoft-hosted agent's preinstalled vcpkg clone is whatever was current
# when the agent image was built; our manifest's builtin-baseline may be a
# newer commit that the agent doesn't have yet. Fetch first so vcpkg can
# resolve the baseline regardless of how new it is.
- script: |
    git -C "$(VCPKG_INSTALLATION_ROOT)" fetch --quiet origin
  displayName: 'Update vcpkg refs'

- task: CMake@1
  displayName: 'Configure Kuku'
  inputs:
    cmakeArgs: >-
      .. -DCMAKE_BUILD_TYPE='${{ parameters.configuration }}'
      -DCMAKE_TOOLCHAIN_FILE=$(VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake
      -DKUKU_BUILD_TESTS=ON -DKUKU_BUILD_EXAMPLES=ON -DKUKU_BUILD_KUKU_C=ON
    workingDirectory: '$(Build.SourcesDirectory)/build'

- task: MSBuild@1
  displayName: 'Build Kuku'
  inputs:
    solution: '$(Build.SourcesDirectory)/build/Kuku.sln'
    msbuildArchitecture: 'x64'
    platform: 'x64'
    configuration: '${{ parameters.configuration }}'

- script: |
    "$(Build.SourcesDirectory)\build\bin\${{ parameters.configuration }}\kukutest.exe"
  displayName: 'Run native unit tests'

# Use the dotnet CLI for the .NET projects rather than NuGetCommand@2 /
# MSBuild@1 / VSTest@2: those invoke the MSBuild that ships with VS 2022
# (17.x), but .NET 10 SDK requires MSBuild 18+. The dotnet CLI carries its
# own compatible MSBuild bundled with the SDK installed by the UseDotNet
# step above.
- task: DotNetCoreCLI@2
  displayName: 'dotnet restore (KukuNet.sln)'
  inputs:
    command: restore
    projects: '$(Build.SourcesDirectory)/dotnet/KukuNet.sln'

- task: DotNetCoreCLI@2
  displayName: 'dotnet build (KukuNet.sln)'
  inputs:
    command: build
    projects: '$(Build.SourcesDirectory)/dotnet/KukuNet.sln'
    arguments: '--configuration ${{ parameters.configuration }} --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'dotnet test (KukuNetTests)'
  inputs:
    command: test
    projects: '**/KukuNetTests.csproj'
    arguments: '--configuration ${{ parameters.configuration }} --no-build --verbosity detailed'

- task: PublishSymbols@2
  displayName: 'Publish symbols path'
  inputs:
    searchPattern: '**\bin\**\*.pdb'
    PublishSymbols: false
  continueOnError: true

- task: CopyFiles@2
  displayName: 'Copy Files to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: '**\${{ parameters.configuration }}\**\?(*.exe|*.dll|*.lib|*.xml)'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'

- task: CopyFiles@2
  displayName: 'Copy Nuspec File to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)\dotnet\nuget\'
    Contents: 'KukuNet-multi.nuspec'
    TargetFolder: '$(Build.ArtifactStagingDirectory)\dotnet\nuget\'

- task: CopyFiles@2
  displayName: 'Copy Targets File to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)\dotnet\nuget\'
    Contents: 'KukuNet.targets'
    TargetFolder: '$(Build.ArtifactStagingDirectory)\dotnet\nuget\'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: windows-drop
