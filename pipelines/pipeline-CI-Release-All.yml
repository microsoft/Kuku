# Release pipeline: builds on Windows + Linux + macOS, then assembles the
# multi-platform NuGet package. Manual-trigger only; not run on push.

trigger: none

stages:
  - stage: build
    displayName: Build
    jobs:
    - template: jobs.yml
      parameters:
        debug: false
        name: Windows
    - template: jobs.yml
      parameters:
        debug: false
        name: Linux
    - template: jobs.yml
      parameters:
        debug: false
        name: macOS
    - template: jobs.yml
      parameters:
        debug: false
        name: NuGet
