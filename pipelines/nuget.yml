steps:
- task: NuGetToolInstaller@1
  displayName: 'Use NuGet'
  inputs:
    versionSpec: ${{ parameters.nuget_version }}

- task: UseDotNet@2
  displayName: 'Get .NET 10 SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: DownloadBuildArtifacts@0
  inputs:
    downloadType: 'single'
    artifactName: 'windows-drop'
    downloadPath: '$(Build.ArtifactStagingDirectory)'

- task: DownloadBuildArtifacts@0
  inputs:
    downloadType: 'single'
    artifactName: 'linux-drop'
    downloadPath: '$(Build.ArtifactStagingDirectory)'

- task: DownloadBuildArtifacts@0
  inputs:
    downloadType: 'single'
    artifactName: 'macos-drop'
    downloadPath: '$(Build.ArtifactStagingDirectory)'

- task: CopyFiles@2
  displayName: 'Copy LICENSE to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: 'LICENSE'
    TargetFolder: '$(Build.ArtifactStagingDirectory)\windows-drop\'

- task: CopyFiles@2
  displayName: 'Copy NOTICE to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: 'NOTICE'
    TargetFolder: '$(Build.ArtifactStagingDirectory)\windows-drop\'

# Build the multi-platform NuGet package. The single $NUGET_MACOS_KUKU_C_PATH$
# entry points at the universal (lipo-merged x86_64+arm64) dylib produced by
# the macOS job; it ships under runtimes/osx/native/ and serves both Apple
# architectures from one slot.
- task: NuGetCommand@2
  displayName: 'Build NuGet Package'
  inputs:
    command: 'pack'
    packagesToPack: '$(Build.ArtifactStagingDirectory)\windows-drop\dotnet\nuget\KukuNet-multi.nuspec'
    packDestination: '$(Build.ArtifactStagingDirectory)\windows-drop\dotnet\nuget\Release'
    buildProperties: 'Configuration=Release;NUGET_WINDOWS_KUKU_C_PATH=$(Build.ArtifactStagingDirectory)\windows-drop\build\bin\Release\kukuc.dll;NUGET_LINUX_KUKU_C_PATH=$(Build.ArtifactStagingDirectory)\linux-drop\lib\libkukuc.so;NUGET_MACOS_KUKU_C_PATH=$(Build.ArtifactStagingDirectory)\macos-drop\lib\libkukuc.dylib'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)\windows-drop\dotnet'
    artifactName: nuget-drop
